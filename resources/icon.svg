<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 3C: Vibrant teal bg, white cards with teal accents, more cards spread wider -->
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#c1)"/>
  <!-- Far back card -->
  <rect x="16" y="24" width="64" height="80" rx="8" fill="white" opacity="0.15" transform="rotate(-14,48,64)"/>
  <!-- Back card -->
  <rect x="22" y="22" width="66" height="82" rx="9" fill="white" opacity="0.3" transform="rotate(-7,55,63)"/>
  <!-- Middle card -->
  <rect x="30" y="20" width="66" height="82" rx="9" fill="white" opacity="0.55" transform="rotate(3,63,61)"/>
  <!-- Front card -->
  <g>
    <rect x="34" y="22" width="68" height="84" rx="10" fill="white"/>
    <!-- Teal header -->
    <rect x="34" y="22" width="68" height="22" rx="10" fill="#0D9488"/>
    <rect x="34" y="34" width="68" height="10" fill="#0D9488"/>
    <!-- Toolbar icons -->
    <circle cx="48" cy="33" r="3" fill="white" opacity="0.7"/>
    <circle cx="58" cy="33" r="3" fill="white" opacity="0.7"/>
    <circle cx="68" cy="33" r="3" fill="white" opacity="0.7"/>
    <!-- {mcp} -->
    <text x="68" y="68" font-family="'Cascadia Code','Fira Code',Consolas,monospace" font-size="19" font-weight="900" fill="#0D9488" text-anchor="middle" dominant-baseline="middle">{mcp}</text>
    <!-- Lines -->
    <rect x="44" y="82" width="40" height="3" rx="1.5" fill="#0D9488" opacity="0.15"/>
    <rect x="44" y="89" width="26" height="3" rx="1.5" fill="#0D9488" opacity="0.1"/>
  </g>
  <!-- Badge count on top-right -->
  <circle cx="98" cy="24" r="12" fill="#F43F5E"/>
  <text x="98" y="25" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">3</text>
</svg>
